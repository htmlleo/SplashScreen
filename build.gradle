buildscript {
    ext {
        kotlin_version = '1.9.0' // Versão estável mais recente do Kotlin
        gradle_version = '8.1.0' // Versão estável mais recente do Gradle Plugin
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath "com.android.tools.build:gradle:$gradle_version"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
